<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categoria | Sistema de Estoque</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{//use.fontawesome.com/releases/v7.2.0/css/all.css}">
</head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="senai-main">
        <section class="senai-hero">
            <div class="senai-shell" style="justify-content:center;">
                <div class="senai-card" style="width: 100%; max-width: 500px;">
                    <h1 class="senai-title" style="font-size: 22px;"
                        th:text="${categoria.idCategoria == null ? 'Nova Categoria' : 'Editar Categoria'}">Categoria
                    </h1>

                    <form th:action="@{/app/categorias/salvar}" th:object="${categoria}" method="post"
                        class="senai-form">

                        <input type="hidden" th:field="*{idCategoria}" />

                        <label class="senai-label" for="nome">Nome da Categoria</label>
                        <input class="senai-input" type="text" id="nome" th:field="*{nome}"
                            placeholder="Ex: Componentes Eletrônicos" required />

                        <div class="senai-actions" style="margin-top: 20px; justify-content: flex-end;">
                            <a class="senai-link" th:href="@{/app/categorias}" style="margin-right: 12px;">Cancelar</a>
                            <button class="senai-button" type="submit">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div th:include="~{fragments/footer :: footer}"></div>
</body>
<script th:src="@{/js/menu.js}"></script>

</html>
